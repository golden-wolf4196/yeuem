name: Masscan Scan

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install masscan
        run: |
          sudo apt-get update
          sudo apt-get install -y masscan
          
      - name: Run masscan
        run: |
          masscan -iL VN-suip.biz.txt \
            -p2087 \
            --rate 500000 \
            --wait 15 \
            -oL sobig.txt \
            --status 10 \
            2>&1 | tee output.log
          
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: scan-results
          path: |
            sobig.txt
            output.log
